name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Host tests
        run: python3 tests/host/run_tests.py

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: espressif/install-esp-idf-action@v1
        with:
          esp-idf-version: v5.5.1
          target: esp32c5
      - name: Build firmware
        run: idf.py build
